databaseChangeLog:
  - changeSet:
      id: 001-create-user-table
      author: f
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: roles
                  type: VARCHAR(255)

  - changeSet:
      id: 002-create-building
      author: f
      changes:
        - createTable:
            tableName: building
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: building_type
                  type: VARCHAR(31)
              - column:
                  name: type
                  type: VARCHAR(255)
              - column:
                  name: level
                  type: INT
                  defaultValueNumeric: "1"
                  constraints:
                    nullable: false

  - changeSet:
      id: 003-create-lumber-mill
      author: f
      changes:
        - createTable:
            tableName: lumber_mill
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: production_rate
                  type: INT
                  defaultValueNumeric: "20"
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: lumber_mill
            baseColumnNames: id
            constraintName: fk_lumber_mill_building
            referencedTableName: building
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 004-create-village-table
      author: f
      changes:
        - createTable:
            tableName: village
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: x_coordinate
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: y_coordinate
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
#              - column:
#                  name: wood
#                  type: INT
#                  constraints:
#                    nullable: false
#              - column:
#                  name: bricks
#                  type: INT
#                  constraints:
#                    nullable: false
#              - column:
#                  name: iron
#                  type: INT
#                  constraints:
#                    nullable: false
#              - column:
#                  name: food
#                  type: INT
#                  constraints:
#                    nullable: false
              - column:
                  name: last_update
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: wood_per_hour
                  type: INT
                  defaultValueNumeric: "3600"
                  constraints:
                    nullable: false
              - column:
                  name: bricks_per_hour
                  type: INT
                  defaultValueNumeric: "3600"
                  constraints:
                    nullable: false
              - column:
                  name: iron_per_hour
                  type: INT
                  defaultValueNumeric: "3600"
                  constraints:
                    nullable: false
              - column:
                  name: food_per_hour
                  type: INT
                  defaultValueNumeric: "3600"
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: village
            baseColumnNames: user_id
            constraintName: fk_village_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 005-construction-site
      author: f
      changes:
        - createTable:
            tableName: construction_site
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: village_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: building_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    unique: true

        - addForeignKeyConstraint:
            baseTableName: construction_site
            baseColumnNames: village_id
            constraintName: fk_construction_site_village
            referencedTableName: village
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: construction_site
            baseColumnNames: building_id
            constraintName: fk_construction_site_building
            referencedTableName: building
            referencedColumnNames: id

  - changeSet:
      id: 006-create-resource-storage-resources-table
      author: f
      changes:
        - createTable:
            tableName: resource_storage_resources
            columns:
              - column:
                  name: village_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: resource
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: INT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: resource_storage_resources
            columnNames: village_id, resource
            constraintName: pk_resource_storage_resources
        - addForeignKeyConstraint:
            baseTableName: resource_storage_resources
            baseColumnNames: village_id
            constraintName: fk_resource_storage_resources_village
            referencedTableName: village
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: add-village-site-id
      author: fredrik l
      changes:
        - addColumn:
            tableName: construction_site
            columns:
              - column:
                  name: village_site_id
                  type: BIGINT
                  constraints:
                    nullable: false

  - changeSet:
      id: world-map
      author: fredrik l
      changes:
        - createTable:
            tableName: map_tiles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: row
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: col
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: occupied
                  type: BOOLEAN
                  defaultValueBoolean: false
        - addUniqueConstraint:
            tableName: map_tiles
            columnNames: row, col
            constraintName: uk_tile_row_col
        - createIndex:
            indexName: idx_tile_free
            tableName: map_tiles
            columns:
              - column:
                  name: occupied

  - changeSet:
      id: reset-production-rates-to-zero
      author: f
      changes:
        - sql:
            sql: UPDATE village SET wood_per_hour = 0, bricks_per_hour = 0, iron_per_hour = 0, food_per_hour = 0
        - addDefaultValue:
            tableName: village
            columnName: wood_per_hour
            defaultValueNumeric: 0
        - addDefaultValue:
            tableName: village
            columnName: bricks_per_hour
            defaultValueNumeric: 0
        - addDefaultValue:
            tableName: village
            columnName: iron_per_hour
            defaultValueNumeric: 0
        - addDefaultValue:
            tableName: village
            columnName: food_per_hour
            defaultValueNumeric: 0

  - changeSet:
      id: 010-create-unit-table
      author: f
      changes:
        - createTable:
            tableName: unit
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: unit_type
                  type: VARCHAR(31)
                  constraints:
                    nullable: false
              - column:
                  name: hp
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: damage
                  type: INT
                  constraints:
                    nullable: false

  - changeSet:
      id: 011-create-village-unit-table
      author: f
      changes:
        - createTable:
            tableName: village_unit
            columns:
              - column:
                  name: village_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: unit_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
        - addPrimaryKey:
            tableName: village_unit
            columnNames: village_id, unit_id
            constraintName: pk_village_unit
        - addForeignKeyConstraint:
            baseTableName: village_unit
            baseColumnNames: village_id
            constraintName: fk_village_unit_village
            referencedTableName: village
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: village_unit
            baseColumnNames: unit_id
            constraintName: fk_village_unit_unit
            referencedTableName: unit
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: drop-password-column-from-users
      author: f
      changes:
        - dropColumn:
            tableName: users
            columnName: password

  - changeSet:
      id: correct-village-production-rate-offset
      author: f
      changes:
        - sql:
            sql: >
              UPDATE village SET
                wood_per_hour   = GREATEST(wood_per_hour   - 18000, 0),
                bricks_per_hour = GREATEST(bricks_per_hour - 18000, 0),
                iron_per_hour   = GREATEST(iron_per_hour   - 18000, 0),
                food_per_hour   = GREATEST(food_per_hour   - 18000, 0)

  - changeSet:
      id: add-base-production-rate-to-villages
      author: f
      changes:
        - sql:
            sql: >
              UPDATE village SET
                wood_per_hour   = wood_per_hour   + 3600,
                bricks_per_hour = bricks_per_hour + 3600,
                iron_per_hour   = iron_per_hour   + 3600,
                food_per_hour   = food_per_hour   + 3600

  - changeSet:
      id: add-refresh-token-table
      author: f
      changes:
        - createSequence:
            sequenceName: refresh_token_seq
            startValue: 1
            incrementBy: 50
        - createTable:
            tableName: refresh_token
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: expiry_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
