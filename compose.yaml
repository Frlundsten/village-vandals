services:
  db:
    image: 'postgres:16-alpine'
    environment:
      - POSTGRES_DB=vandals
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vandals"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    container_name: keycloak
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/villagevandals || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8081:8081"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: vandals
      SECRET: ${SECRET}
      KEYCLOAK_BASE_URL: "http://keycloak:8080"
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      APP_SECURE_COOKIE: "false"
    depends_on:
      db:
        condition: service_healthy
#      keycloak:
#        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:8081
        VITE_KEYCLOAK_BASE_URL: http://localhost:8080
        VITE_APP_URL: http://localhost
    ports:
      - "80:80"
    depends_on:
      - backend
